<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, Papel o Tijera - ML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        canvas {
            border: 2px solid #333;
            border-radius: 4px;
            background-color: #000;
        }
        #label-container {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        #label-container div {
            margin: 5px 0;
            padding: 5px;
            background: #e9ecef;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Detector de Poses: Piedra, Papel o Tijera</h2>
    <button type="button" onclick="init()">Iniciar Cámara</button>
    <div><canvas id="canvas"></canvas></div>
    <div id="label-container"></div>
</div>

<!-- Librerías de TensorFlow.js y Teachable Machine Pose actualizadas y compatibles -->
<script src="https://jsdelivr.net"></script>
<script src="https://jsdelivr.net"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/WOCXLX73G/";
    let model, webcam, ctx, labelContainer, maxPredictions;
    let isRunning = false;

    async function init() {
        if (isRunning) return; // Evita inicializar el modelo múltiples veces
        isRunning = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // Carga el modelo y sus metadatos
        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // Configuración de la cámara web
        const size = 300; // Tamaño de la ventana de video
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        
        await webcam.setup(); // Solicita permisos de acceso a la cámara
        await webcam.play();
        window.requestAnimationFrame(loop);

        // Configuración del lienzo (Canvas)
        const canvas = document.getElementById("canvas");
        canvas.width = size; 
        canvas.height = size;
        ctx = canvas.getContext("2d");
        
        // Configuración del contenedor de texto
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // Limpia mensajes previos
        for (let i = 0; i < maxPredictions; i++) { 
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function loop(timestamp) {
        webcam.update(); // Actualiza el fotograma de la cámara
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        // Ejecuta la imagen de la cámara a través de PoseNet
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        // Clasifica la pose obtenida con el modelo de Teachable Machine
        const prediction = await model.predict(posenetOutput);

        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        drawPose(pose);
    }

    function drawPose(pose) {
        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);
            // Dibuja los puntos del cuerpo y el esqueleto en pantalla
            if (pose) {
                const minPartConfidence = 0.5;
                tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
            }
        }
    }
</script>

</body>
</html>
