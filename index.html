<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piedra, Papel o Tijeras - Teachable Machine</title>

    <!-- TensorFlow y Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <style>
        #header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #logo {
            width: 180px;
            margin-bottom: 10px;
        }

        #header h2 {
            margin: 0;
            color: #222;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        #canvas {
            border: 3px solid #333;
            border-radius: 10px;
            margin-top: 20px;
        }

        #resultado {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #0077cc;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #0077cc;
            color: white;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>

<body>
    <div id="header">
        <img 
            src="https://upload.wikimedia.org/wikipedia/commons/6/66/LOGO_EN_NEGRO_MAMB.png" 
            alt="Logo MAMB"
            id="logo"
        >

        <h2>Museo de Arte Moderno de Barranquilla</h2>
    </div>

    <h1>Piedra, Papel o Tijeras</h1>

    <button onclick="init()">Iniciar Cámara</button>

    <div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="resultado">Esperando predicción...</div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/WOCXLX73G/";

        let model, webcam, ctx, maxPredictions;

        async function init() {

            // Cargar modelo
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Configuración de cámara
            const size = 300;
            const flip = true;

            webcam = new tmPose.Webcam(size, size, flip);

            await webcam.setup();
            await webcam.play();

            window.requestAnimationFrame(loop);

            // Canvas
            const canvas = document.getElementById("canvas");
            canvas.width = size;
            canvas.height = size;

            ctx = canvas.getContext("2d");
        }

        async function loop() {
            webcam.update();

            await predict();

            window.requestAnimationFrame(loop);
        }

        async function predict() {

            // Detectar pose
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);

            // Predicción
            const prediction = await model.predict(posenetOutput);

            let resultadosHTML = "";

            // Mostrar todas las clases y porcentajes
            for (let i = 0; i < maxPredictions; i++) {

                const nombre = prediction[i].className;
                const porcentaje = (prediction[i].probability * 100).toFixed(1);

                resultadosHTML += `
                    <p>${nombre}: ${porcentaje}%</p>
                `;
            }

// Mostrar resultados en pantalla
document.getElementById("resultado").innerHTML = resultadosHTML;

            // Dibujar cámara y esqueleto
            drawPose(pose);
        }

        function drawPose(pose) {

            if (webcam.canvas) {

                ctx.drawImage(webcam.canvas, 0, 0);

                if (pose) {
                    const minPartConfidence = 0.5;

                    tmPose.drawKeypoints(
                        pose.keypoints,
                        minPartConfidence,
                        ctx
                    );

                    tmPose.drawSkeleton(
                        pose.keypoints,
                        minPartConfidence,
                        ctx
                    );
                }
            }
        }
    </script>

</body>
<footer>Presentado por: Samuel David Garcia Mejia</footer>
</html>
