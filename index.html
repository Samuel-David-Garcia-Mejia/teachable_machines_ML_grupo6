<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, Papel o Tijera - Fijo Móvil</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 100%; width: 340px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        button { background-color: #007bff; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        canvas { border: 3px solid #333; background-color: #000; max-width: 100%; border-radius: 8px; margin-top: 15px; display: none; }
        #status { margin: 10px 0; color: #666; font-size: 14px; font-style: italic; }
        #label-container { margin-top: 15px; font-weight: bold; }
        #label-container div { margin: 6px 0; padding: 10px; background: #e9ecef; border-radius: 6px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Detector de Poses (Móvil)</h2>
    <div id="status">Cargando librerías de IA...</div>
    <button type="button" id="start-btn" onclick="init()" disabled>Iniciar Cámara</button>
    
    <!-- Elemento de video oculto que captura la cámara correctamente en móviles -->
    <video id="video" autoplay playsinline muted style="display:none; width:300px; height:300px;"></video>
    <canvas id="canvas"></canvas>
    <div id="label-container"></div>
</div>

<!-- Scripts estables y compatibles con arquitecturas móviles -->
<script src="https://jsdelivr.net"></script>
<script src="https://jsdelivr.net"></script>

<script type="text/javascript">
    const URL = "https://withgoogle.com";
    let model, ctx, labelContainer, maxPredictions;
    let isRunning = false;
    const size = 300;

    const statusDiv = document.getElementById("status");
    const startBtn = document.getElementById("start-btn");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");

    // Habilita el botón solo cuando el entorno inicial básico está listo
    window.onload = () => {
        statusDiv.innerText = "Librerías listas. Presiona Iniciar.";
        startBtn.disabled = false;
    };

    async function init() {
        if (isRunning) return;
        startBtn.disabled = true;
        statusDiv.innerText = "Cargando modelo de IA (Piedra/Papel/Tijera)...";

        try {
            // 1. Cargar el modelo de IA
            model = await tmPose.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            statusDiv.innerText = "Solicitando acceso a la cámara frontal...";

            // 2. Configurar cámara nativa compatible con Chrome Android y Safari iOS
            const constraints = {
                video: {
                    width: { ideal: size },
                    height: { ideal: size },
                    facingMode: "user" // Fuerza de forma estricta la cámara delantera (autofoto)
                },
                audio: false
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;

            // Esperar a que el video móvil tenga datos reales antes de activar el bucle
            video.addEventListener('loadeddata', () => {
                canvas.width = size;
                canvas.height = size;
                ctx = canvas.getContext("2d");
                
                // Preparar el contenedor de texto
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }

                canvas.style.display = "inline-block";
                statusDiv.innerText = "¡Ejecutando detector con éxito!";
                isRunning = true;
                window.requestAnimationFrame(loop);
            });

        } catch (error) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "Error crítico: " + error.message;
            console.error(error);
        }
    }

    async function loop() {
        if (!isRunning) return;

        // Dibujar el fotograma del video en el lienzo aplicando efecto espejo
        ctx.save();
        ctx.translate(size, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, size, size);
        ctx.restore();

        // Procesar la imagen que está en el lienzo
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        // Ejecutar predicción directamente sobre el Canvas procesado
        const { pose, posenetOutput } = await model.estimatePose(canvas);
        const prediction = await model.predict(posenetOutput);

        // Mostrar porcentajes actualizados
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        // Dibujar los puntos clave encima de la mano
        if (pose) {
            const minPartConfidence = 0.5;
            tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
            tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
        }
    }
</script>

</body>
</html>
